services:
  - type: web
    name: nhom7-lapstore-backend
    env: node
    plan: free
    buildCommand: cd BackendWeb && npm install
    startCommand: cd BackendWeb && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lapstore-db
          property: connectionString
      - key: PORT
        value: 10000

  - type: web
    name: nhom7-lapstore-frontend
    env: node
    plan: free
    buildCommand: cd FrontendWeb && npm install && npm run build
    startCommand: cd FrontendWeb && npx serve -s build
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: https://nhom7-lapstore-backend.onrender.com/api
      - key: REACT_APP_BACKEND_URL
        value: https://nhom7-lapstore-backend.onrender.com
      - key: REACT_APP_PUBLIC_SITE_URL
        value: https://nhom7-lapstore.onrender.com

databases:
  - name: lapstore-db
    databaseName: lapstore_db
    plan: free
    user: lapstore_user
    region: singapore
