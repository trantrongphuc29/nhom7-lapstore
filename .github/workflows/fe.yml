# Deploy frontend (Render) — Deploy Hook riêng cho service static/React
# Secret repo: RENDER_DEPLOY_HOOK_FRONTEND
# Biến REACT_APP_* dưới đây khớp render.yaml; đổi URL nếu domain production khác.
name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "FrontendWeb/**"
      - ".github/workflows/fe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CI: true
      REACT_APP_API_URL: https://nhom7-lapstore-backend.onrender.com/api
      REACT_APP_BACKEND_URL: https://nhom7-lapstore-backend.onrender.com
      REACT_APP_PUBLIC_SITE_URL: https://nhom7-lapstore.onrender.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FrontendWeb/package-lock.json

      - name: Install & build (verify trước khi trigger deploy)
        working-directory: FrontendWeb
        run: |
          npm ci
          npm run build

      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Secret RENDER_DEPLOY_HOOK_FRONTEND chưa được cấu hình trong GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          curl -fsS -X POST "$HOOK"
